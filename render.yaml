services:
  - type: web
    name: persian-football-club
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: CHANNEL_MEMBERSHIP_REQUIRED
        value: "false"
      - key: VITE_DEMO_DATA_ENABLED
        value: "true"
      - key: DEMO_DATA_ENABLED
        value: "true"
      - key: FOOTBALL_API_ENABLED
        value: "false"
